<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>D'Aurora · Guilda Luminavio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --papiro: #f5edd8;
  --papiro-escuro: #ede0c4;
  --papiro-borda: #d9c9a8;
  --tinta: #2a1f0e;
  --tinta-media: #3d2a10;
  --tinta-leve: #6b4f2e;
  --ouro: #7a5520;
  --ouro-claro: #c9a84c;
  --ouro-fundo: #f9f3e3;
  --azul-mar: #1a3a5c;
  --vermelho-sombra: #7a2020;
  --borda: #c9a84c;
}

html, body {
  height: 100%;
  background: var(--papiro-escuro);
  color: var(--tinta);
  font-family: 'EB Garamond', Georgia, serif;
  overflow: hidden;
}

/* ═══ TELA DE ENTRADA ═══ */
#screen-entry {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--papiro-escuro);
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(26,58,92,0.06) 0%, transparent 60%);
  z-index: 100;
  transition: opacity 0.8s ease;
  padding: 1rem;
}

.entry-card {
  background: var(--papiro);
  border: 1px solid var(--papiro-borda);
  border-radius: 2px;
  max-width: 460px;
  width: 100%;
  padding: 2.5rem 2rem;
  text-align: center;
  box-shadow:
    0 2px 8px rgba(42,31,14,0.12),
    0 8px 32px rgba(42,31,14,0.08),
    inset 0 1px 0 rgba(255,255,255,0.6);
  position: relative;
}

/* Bordas decorativas nos cantos */
.entry-card::before,
.entry-card::after {
  content: '';
  position: absolute;
  width: 24px; height: 24px;
  border-color: var(--ouro-claro);
  border-style: solid;
}
.entry-card::before {
  top: 10px; left: 10px;
  border-width: 2px 0 0 2px;
}
.entry-card::after {
  bottom: 10px; right: 10px;
  border-width: 0 2px 2px 0;
}

/* FAROL */
.farol-wrap {
  width: 100px; height: 130px;
  margin: 0 auto 1.5rem;
}

.farol-luz {
  animation: farolPulse 3s ease-in-out infinite;
  transform-origin: 50px 24px;
}

@keyframes farolPulse {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

.farol-raio {
  animation: raioGira 10s linear infinite;
  transform-origin: 50px 24px;
}

@keyframes raioGira {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.ondas-anim {
  animation: ondasMove 4s ease-in-out infinite;
}

@keyframes ondasMove {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(-6px); }
}

.entry-ornament {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 5px;
  color: var(--ouro);
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

.entry-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(32px, 7vw, 48px);
  font-weight: 600;
  color: var(--tinta);
  letter-spacing: 3px;
  margin-bottom: 0.2rem;
  line-height: 1;
}

.entry-subtitle {
  font-style: italic;
  font-size: clamp(12px, 3vw, 14px);
  color: var(--tinta-leve);
  letter-spacing: 1px;
  margin-bottom: 1.25rem;
}

.entry-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 auto 1.25rem;
  max-width: 200px;
}

.entry-divider::before,
.entry-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--ouro-claro);
  opacity: 0.5;
}

.entry-divider-icon {
  color: var(--ouro-claro);
  font-size: 12px;
}

.entry-tagline {
  font-size: clamp(14px, 3.5vw, 16px);
  font-style: italic;
  line-height: 1.8;
  color: var(--tinta-media);
  margin-bottom: 2rem;
}

.btn-entrar {
  display: inline-block;
  padding: 12px 36px;
  border: 1px solid var(--ouro);
  background: transparent;
  color: var(--tinta);
  font-family: 'Cinzel', serif;
  font-size: clamp(10px, 2.5vw, 12px);
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  margin-bottom: 1rem;
}

.btn-entrar:hover {
  background: var(--ouro-fundo);
  border-color: var(--ouro-claro);
}


.api-input {
  width: 100%;
  background: var(--ouro-fundo);
  border: 1px solid var(--papiro-borda);
  color: var(--tinta);
  font-family: monospace;
  font-size: 12px;
  padding: 9px 12px;
  border-radius: 2px;
  margin-bottom: 6px;
  outline: none;
}

.api-input:focus { border-color: var(--ouro); }
.api-error { color: var(--vermelho-sombra); font-size: 12px; margin-bottom: 6px; }



/* ═══ TELA DO CHAT ═══ */
#screen-chat {
  display: none;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  background: var(--papiro-escuro);
  background-image:
    radial-gradient(ellipse at 10% 0%, rgba(201,168,76,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 100%, rgba(26,58,92,0.04) 0%, transparent 50%);
}

#screen-chat.active { display: flex; }

/* HEADER */
.chat-header {
  background: var(--papiro);
  border-bottom: 1px solid var(--papiro-borda);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(42,31,14,0.08);
}

.header-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--tinta);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--papiro);
  flex-shrink: 0;
  letter-spacing: 0;
}

.header-info { flex: 1; min-width: 0; }

.header-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(13px, 3vw, 14px);
  color: var(--tinta);
  letter-spacing: 1px;
}

.header-status {
  font-size: 11px;
  color: var(--tinta-leve);
  font-style: italic;
  margin-top: 1px;
}

.header-ornament {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--ouro-claro);
  display: none;
}

@media (min-width: 480px) { .header-ornament { display: block; } }

/* ÁREA DE MENSAGENS */
#messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 14px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

@media (min-width: 600px) { #messages-area { padding: 24px; max-width: 760px; margin: 0 auto; width: 100%; } }

#messages-area::-webkit-scrollbar { width: 4px; }
#messages-area::-webkit-scrollbar-track { background: transparent; }
#messages-area::-webkit-scrollbar-thumb { background: rgba(154,112,48,0.3); border-radius: 2px; }

/* MENSAGENS */
.msg {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
  animation: msgIn 0.3s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 2px;
}

.msg.dauro .msg-avatar {
  background: var(--tinta);
  color: var(--papiro);
}

.msg.user .msg-avatar {
  background: var(--papiro-borda);
  color: var(--tinta-media);
  font-size: 13px;
}

.msg-bubble {
  max-width: calc(100% - 46px);
  padding: 14px 16px;
  font-size: clamp(16px, 3.8vw, 18px);
  line-height: 1.8;
  border-radius: 2px;
}

.msg.dauro .msg-bubble {
  background: var(--papiro);
  border: 1px solid var(--papiro-borda);
  color: var(--tinta);
  border-top-left-radius: 0;
  box-shadow: 0 1px 3px rgba(42,31,14,0.06);
  border-left: 3px solid var(--ouro-claro);
}

.msg.user .msg-bubble {
  background: var(--ouro-fundo);
  border: 1px solid var(--papiro-borda);
  color: var(--tinta-media);
  border-top-right-radius: 0;
}

.msg-bubble strong { color: var(--tinta); font-weight: 500; }
.msg-bubble em { color: var(--tinta-leve); }
.msg-bubble h3 {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--ouro);
  margin: 1rem 0 0.5rem;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.msg-bubble ul { padding-left: 1.2rem; margin: 0.5rem 0; }
.msg-bubble li { margin-bottom: 0.4rem; }
.msg-bubble hr {
  border: none;
  border-top: 1px solid var(--papiro-borda);
  margin: 1rem 0;
}
.msg-bubble p { margin: 0.5rem 0; }
.msg-bubble p:first-child { margin-top: 0; }
.msg-bubble p:last-child { margin-bottom: 0; }

/* DIGITANDO */
.typing-indicator {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
  align-items: center;
}

.typing-dots {
  background: var(--papiro);
  border: 1px solid var(--papiro-borda);
  border-left: 3px solid var(--ouro-claro);
  padding: 14px 18px;
  border-radius: 2px;
  border-top-left-radius: 0;
  display: flex;
  gap: 5px;
  align-items: center;
}

.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ouro);
  opacity: 0.3;
  animation: dotPulse 1.4s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 60%, 100% { opacity: 0.2; transform: scale(1); }
  30% { opacity: 1; transform: scale(1.2); }
}

/* IMAGEM DO PERSONAGEM */
.character-image-wrap {
  margin: 16px 0 4px;
  text-align: center;
}

.character-image-wrap img {
  max-width: 300px;
  width: 100%;
  border-radius: 2px;
  border: 2px solid var(--papiro-borda);
  box-shadow: 0 2px 12px rgba(42,31,14,0.15);
}

.img-loading {
  width: 180px;
  height: 180px;
  background: var(--ouro-fundo);
  border: 1px solid var(--papiro-borda);
  border-radius: 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  gap: 10px;
  font-size: 13px;
  color: var(--tinta-leve);
  font-style: italic;
}

.img-spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--papiro-borda);
  border-top-color: var(--ouro);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* EMAIL */
.email-capture {
  margin-top: 16px;
  padding: 14px 16px;
  background: var(--ouro-fundo);
  border: 1px solid var(--papiro-borda);
  border-radius: 2px;
  border-top: 2px solid var(--ouro-claro);
}

.email-capture-title {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--tinta-leve);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.email-input-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.email-input {
  flex: 1;
  min-width: 180px;
  background: var(--papiro);
  border: 1px solid var(--papiro-borda);
  color: var(--tinta);
  font-family: 'EB Garamond', serif;
  font-size: clamp(15px, 3.5vw, 16px);
  padding: 8px 12px;
  border-radius: 2px;
  outline: none;
}

.email-input:focus { border-color: var(--ouro); }

.btn-email-send {
  padding: 8px 18px;
  background: var(--tinta);
  border: none;
  color: var(--papiro);
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  white-space: nowrap;
  transition: opacity 0.2s;
}

.btn-email-send:hover { opacity: 0.8; }
.btn-email-send:disabled { opacity: 0.4; cursor: not-allowed; }

.email-status { margin-top: 8px; font-size: 13px; font-style: italic; color: var(--tinta-leve); }
.email-status.success { color: #3a6b3a; }
.email-status.error { color: var(--vermelho-sombra); }

/* ÁREA DE INPUT */
.input-area {
  background: var(--papiro);
  border-top: 1px solid var(--papiro-borda);
  padding: 10px 14px 12px;
  flex-shrink: 0;
  box-shadow: 0 -1px 4px rgba(42,31,14,0.06);
}

@media (min-width: 600px) {
  .input-area { padding: 12px 24px 14px; }
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 760px;
  margin: 0 auto;
}

#user-input {
  flex: 1;
  background: var(--ouro-fundo);
  border: 1px solid var(--papiro-borda);
  color: var(--tinta);
  font-family: 'EB Garamond', serif;
  font-size: clamp(16px, 3.8vw, 18px);
  padding: 10px 14px;
  border-radius: 2px;
  resize: none;
  height: 46px;
  min-height: 46px;
  max-height: 120px;
  outline: none;
  line-height: 1.5;
  transition: border-color 0.2s;
}

#user-input:focus { border-color: var(--ouro); }
#user-input::placeholder { color: var(--tinta-leve); font-style: italic; opacity: 0.6; }

#send-btn {
  width: 46px; height: 46px;
  background: var(--tinta);
  border: none;
  border-radius: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s;
}

#send-btn:hover:not(:disabled) { opacity: 0.8; }
#send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
#send-btn svg { width: 18px; height: 18px; fill: var(--papiro); }

.input-hint {
  text-align: center;
  margin-top: 5px;
  font-size: 11px;
  color: var(--tinta-leve);
  opacity: 0.5;
  max-width: 760px;
  margin-left: auto;
  margin-right: auto;
}

/* ═══ FUNDOS COM IMAGEM ═══ */
#screen-entry {
  background-image: none !important;
}

.entry-bg-img {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center top;
  opacity: 0.18;
  z-index: 0;
  pointer-events: none;
}

.entry-card {
  position: relative;
  z-index: 1;
}

#chat-bg-img {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  z-index: -1;
  transition: opacity 1.2s ease, background-image 1.5s ease;
  pointer-events: none;
}

#chat-bg-img.visible {
  opacity: 0.10;
}

#chat-bg-img.encontro {
  opacity: 0.14;
}
</style>
</head>
<body>

<!-- ═══ TELA DE ENTRADA ═══ -->
<div id="chat-bg-img"></div>
<div id="screen-entry">
  <div class="entry-bg-img" id="entry-bg-img"></div>
  <div class="entry-card">

    <!-- FAROL ANIMADO -->
    <div class="farol-wrap">
      <svg viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
        <!-- Raio de luz -->
        <g class="farol-raio">
          <polygon points="50,24 16,110 50,96 84,110" fill="rgba(154,112,48,0.07)"/>
        </g>
        <!-- Halo -->
        <circle class="farol-luz" cx="50" cy="24" r="16" fill="rgba(201,168,76,0.12)"/>
        <circle class="farol-luz" cx="50" cy="24" r="8" fill="rgba(201,168,76,0.25)"/>
        <!-- Torre -->
        <rect x="40" y="30" width="20" height="58" fill="#f5edd8" stroke="#9a7030" stroke-width="1"/>
        <!-- Janelas -->
        <rect x="44" y="40" width="12" height="12" rx="1" fill="rgba(154,112,48,0.35)" stroke="#c9a84c" stroke-width="0.5"/>
        <rect x="44" y="60" width="12" height="12" rx="1" fill="rgba(154,112,48,0.18)" stroke="#c9a84c" stroke-width="0.5"/>
        <!-- Lanterna -->
        <rect x="36" y="18" width="28" height="14" rx="1" fill="#f5edd8" stroke="#9a7030" stroke-width="1"/>
        <circle cx="50" cy="25" r="5" fill="#c9a84c" opacity="0.9"/>
        <!-- Base -->
        <rect x="34" y="88" width="32" height="7" rx="1" fill="#ede0c4" stroke="#c9a84c" stroke-width="0.8"/>
        <!-- Rocha -->
        <ellipse cx="50" cy="100" rx="28" ry="7" fill="#ede0c4" stroke="#d9c9a8" stroke-width="0.8"/>
        <!-- Ondas -->
        <g class="ondas-anim">
          <path d="M4 112 Q22 107 40 112 Q58 117 76 112 Q90 108 98 112" stroke="#9a7030" stroke-width="0.8" fill="none" opacity="0.5"/>
          <path d="M0 122 Q20 117 42 122 Q64 127 84 122 Q94 119 100 122" stroke="#9a7030" stroke-width="0.7" fill="none" opacity="0.3"/>
        </g>
        <!-- Estrelas decorativas -->
        <circle cx="14" cy="10" r="0.9" fill="#c9a84c" opacity="0.7"/>
        <circle cx="82" cy="6" r="1.1" fill="#c9a84c" opacity="0.85"/>
        <circle cx="92" cy="18" r="0.7" fill="#c9a84c" opacity="0.5"/>
        <circle cx="8" cy="28" r="0.7" fill="#c9a84c" opacity="0.4"/>
      </svg>
    </div>

    <div class="entry-ornament">✦ &nbsp; Guilda Luminavio &nbsp; ✦</div>
    <h1 class="entry-title">D'Aurora</h1>
    <div class="entry-subtitle">Promontório Silenciado · Mar do Meio</div>

    <div class="entry-divider">
      <span class="entry-divider-icon">⚓</span>
    </div>

    <p class="entry-tagline">
      Todo navegador conhece o horizonte à sua frente.<br>
      Poucos conhecem a profundidade que carregam.
    </p>

    <button class="btn-entrar" onclick="abrirChat()">
      Entrar no Promontório
    </button>
    </div>

  </div>
</div>

<!-- ═══ TELA DO CHAT ═══ -->
<div id="screen-chat">

  <div class="chat-header">
    <div class="header-avatar">D</div>
    <div class="header-info">
      <div class="header-name">Henrique D'Aurora</div>
      <div class="header-status">Promontório Silenciado · A Cruzada dos Oceanos</div>
    </div>
    <div class="header-ornament">✦ ⚓ ✦</div>
  </div>

  <div id="messages-area"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="user-input"
        placeholder="Escreva sua resposta..."
        rows="1"
        disabled
      ></textarea>
      <button id="send-btn" onclick="enviarMensagem()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter para enviar · Shift+Enter para nova linha</div>
  </div>

</div>

let historico = [];

let carregando = false;
let analiseCompleta = '';
let nomePersonagem = '';
let emailEnviado = false;

window.addEventListener('load', () => {
  document.getElementById('entry-bg-img').style.backgroundImage = `url(${IMG_FAROL})`;

  document.getElementById('user-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!carregando) enviarMensagem();
    }
  });

  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
});



function abrirChat() {
  document.getElementById('screen-entry').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('screen-entry').style.display = 'none';
    const bgEl = document.getElementById('chat-bg-img');
    bgEl.style.backgroundImage = `url(${IMG_MAPAS})`;
    setTimeout(() => bgEl.classList.add('visible'), 100);
    document.getElementById('screen-chat').classList.add('active');
    document.getElementById('user-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
    iniciarConversa();
  }, 800);
}

async function iniciarConversa() {
  await chamarAPI("Olá, D'Aurora.");
}

async function enviarMensagem() {
  if (carregando) return;
  const input = document.getElementById('user-input');
  const texto = input.value.trim();
  if (!texto) return;
  input.value = '';
  input.style.height = 'auto';
  adicionarMensagem('user', texto);
  historico.push({ role: 'user', content: texto });
  await chamarAPI(null);
}

async function chamarAPI(mensagemInicial) {
  carregando = true;
  document.getElementById('send-btn').disabled = true;

  if (mensagemInicial) {
    historico.push({ role: 'user', content: mensagemInicial });
  }

  const typingId = mostrarDigitando();

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'chat', messages: historico }),
    });

    const dados = await resp.json();
    removerDigitando(typingId);

    if (dados.error) {
      adicionarMensagem('dauro', 'As correntes estão agitadas neste momento. Tente novamente.');
      return;
    }

    let texto = dados.text || '';
    const pedirEmail = dados.requestEmail || texto.includes('REQUEST_EMAIL');
    texto = texto.replace(/REQUEST_EMAIL/g, '').trim();

    if (texto.length > 300) analiseCompleta = texto;

    historico.push({ role: 'assistant', content: texto });
    const msgEl = adicionarMensagem('dauro', texto);

    if (dados.imagePrompt) gerarImagem(dados.imagePrompt, msgEl);
    if (pedirEmail && !emailEnviado) {
    mostrarCapturaEmail(msgEl);
    const bgEl = document.getElementById('chat-bg-img');
    bgEl.style.backgroundImage = `url(${IMG_ENCONTRO})`;
    bgEl.classList.add('encontro');
  }

  } catch (err) {
    removerDigitando(typingId);
    adicionarMensagem('dauro', 'Algo nas correntes interrompeu a comunicação. Tente novamente.');
  } finally {
    carregando = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }
}

async function gerarImagem(prompt, msgEl) {
  const wrap = document.createElement('div');
  wrap.className = 'character-image-wrap';
  const loading = document.createElement('div');
  loading.className = 'img-loading';
  loading.innerHTML = `<div class="img-spinner"></div><span>Invocando a imagem...</span>`;
  wrap.appendChild(loading);
  msgEl.querySelector('.msg-bubble').appendChild(wrap);
  rolarParaBaixo();

  try {
    const promptEncoded = encodeURIComponent(prompt.substring(0, 500));
    const imgUrl = `https://image.pollinations.ai/prompt/${promptEncoded}?width=512&height=512&seed=${Date.now()}&nologo=true`;
    const img = document.createElement('img');
    img.onload = () => { loading.remove(); wrap.appendChild(img); rolarParaBaixo(); };
    img.onerror = () => { loading.innerHTML = '<span>Imagem não disponível neste momento</span>'; };
    img.src = imgUrl;
    img.alt = 'Seu personagem no universo ACO';
  } catch (err) {
    loading.innerHTML = '<span>Imagem não disponível</span>';
  }
}

function mostrarCapturaEmail(msgEl) {
  const capture = document.createElement('div');
  capture.className = 'email-capture';
  capture.innerHTML = `
    <div class="email-capture-title">Enviar mapa por email</div>
    <div class="email-input-row">
      <input class="email-input" id="email-input" type="email" placeholder="seu@email.com" autocomplete="email"/>
      <button class="btn-email-send" onclick="enviarEmail()">Enviar</button>
    </div>
    <div class="email-status" id="email-status"></div>
  `;
  msgEl.querySelector('.msg-bubble').appendChild(capture);
  rolarParaBaixo();
  setTimeout(() => { const el = document.getElementById('email-input'); if (el) el.focus(); }, 300);
}

async function enviarEmail() {
  const emailEl = document.getElementById('email-input');
  const statusEl = document.getElementById('email-status');
  const btnEl = document.querySelector('.btn-email-send');
  const email = emailEl?.value?.trim();

  if (!email || !email.includes('@')) {
    statusEl.textContent = 'Por favor, informe um email válido.';
    statusEl.className = 'email-status error';
    return;
  }

  btnEl.disabled = true;
  statusEl.textContent = 'Enviando carta do Promontório...';
  statusEl.className = 'email-status';

  const imgEl = document.querySelector('.character-image-wrap img');
  const imageUrl = imgEl ? imgEl.src : null;

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'send_email',
        email, name: nomePersonagem || null,
        analysis: analiseCompleta,
        imageUrl,
        characterName: nomePersonagem || null,
        
      }),
    });

    const dados = await resp.json();

    if (dados.success) {
      statusEl.textContent = 'Carta enviada. As correntes levam o que precisa chegar.';
      statusEl.className = 'email-status success';
      emailEnviado = true;
      emailEl.disabled = true;
      btnEl.disabled = true;
    } else {
      statusEl.textContent = 'Houve um contratempo. Tente novamente.';
      statusEl.className = 'email-status error';
      btnEl.disabled = false;
    }
  } catch (err) {
    statusEl.textContent = 'As correntes estão agitadas. Tente novamente.';
    statusEl.className = 'email-status error';
    btnEl.disabled = false;
  }
}

function adicionarMensagem(papel, texto) {
  const area = document.getElementById('messages-area');
  const msgDiv = document.createElement('div');
  msgDiv.className = `msg ${papel}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = papel === 'dauro' ? 'D' : '✦';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = parsearMarkdown(texto);

  if (papel === 'dauro') {
    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
  } else {
    msgDiv.appendChild(bubble);
    msgDiv.appendChild(avatar);
  }

  area.appendChild(msgDiv);
  rolarParaBaixo();
  return msgDiv;
}

function parsearMarkdown(texto) {
  return texto
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^([^<].+)$/, '<p>$1</p>')
    .replace(/<p>(<h3>)/g, '$1').replace(/(<\/h3>)<\/p>/g, '$1')
    .replace(/<p>(<hr>)<\/p>/g, '$1')
    .replace(/<p>(<ul>)/g, '$1').replace(/(<\/ul>)<\/p>/g, '$1');
}

function mostrarDigitando() {
  const id = 'typing-' + Date.now();
  const area = document.getElementById('messages-area');
  const el = document.createElement('div');
  el.className = 'typing-indicator';
  el.id = id;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar dauro';
  avatar.style.cssText = 'width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Cinzel,serif;font-size:11px;background:#2a1f0e;color:#f5edd8;flex-shrink:0;align-self:flex-start;margin-top:2px';
  avatar.textContent = 'D';

  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';

  el.appendChild(avatar);
  el.appendChild(dots);
  area.appendChild(el);
  rolarParaBaixo();
  return id;
}

function removerDigitando(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function rolarParaBaixo() {
  const area = document.getElementById('messages-area');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}
</script>
